<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortner</title>
    <link rel="stylesheet" href="/styles.css">
    
</head>
<body>
    <input type="text" id="urlInput" placeholder="Enter URL here" size="40" />
  <button id="shortenBtn">Shorten</button>

  <div id="result"></div>
  <script>
    const urlInput=document.getElementById("urlInput");
    const shortenBtn=document.getElementById("shortenBtn");
    const result=document.getElementById("result");

    shortenBtn.addEventListener('click',async ()=>{
        const txt=urlInput.value;
        const res=await fetch("/shorten",{
            method :"POST",
            headers:"application/json",
            body:JSON.stringify({originalUrl:txt})
        });
        const data=await res.json;
        if(data.shortenUrl){
            result.innerHTML=`the shortenedUrl is <a href=${data.shortenUrl} target="blank">${data.shortenUrl}</a>`;
        }
        else{
            res.innerHTML="Error Occured!!"
        }
    });

  </script>
</body>
</html>
