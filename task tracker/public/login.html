<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Welcome Back</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <p style="margin-top: 15px; font-size: 14px;">
            Don't have an account? <a href="signup.html" style="color: var(--accent);">Sign up here</a>
        </p>
    </div>

    <script>
        // 🚀 If already logged in, go straight to the tasks!
        if (localStorage.getItem('token')) {
            window.location.href = "index.html";
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    // 🎫 Store the "Passport" (Token) so we can use it later
                    localStorage.setItem('token', data.token);
                    window.location.href = "index.html";
                } else {
                    const error = await res.text();
                    alert("Login failed: " + error);
                }
            } catch (err) {
                console.error(err);
                alert("Server error during login");
            }
        }
    </script>
</body>

</html>
